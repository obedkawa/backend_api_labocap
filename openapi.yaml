# ════════════════════════════════════════════════════════════════════════════════
# COMPONENTS
# ════════════════════════════════════════════════════════════════════════════════

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ── REUSABLE PARAMETERS ──────────────────────────────────────────────────────

  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    page:
      name: page
      in: query
      schema:
        type: integer
        default: 0
        minimum: 0
    size:
      name: size
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
    search:
      name: search
      in: query
      schema:
        type: string
    sortBy:
      name: sortBy
      in: query
      schema:
        type: string
        default: createdAt
    sortDir:
      name: sortDir
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: desc

  # ── REUSABLE RESPONSES ───────────────────────────────────────────────────────

  responses:
    EmptySuccess:
      description: Opération réussie
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/EmptyApiResponse'
    NotFound:
      description: Ressource introuvable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorApiResponse'
    Unauthorized:
      description: Non authentifié ou token invalide
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorApiResponse'
    Forbidden:
      description: Permission insuffisante
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorApiResponse'
    Conflict:
      description: Ressource déjà existante
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorApiResponse'
    BusinessError:
      description: Règle métier violée
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorApiResponse'
    ValidationError:
      description: Données de saisie invalides
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorApiResponse'

  # ── SCHEMAS ──────────────────────────────────────────────────────────────────

  schemas:

    # -- Enums ----------------------------------------------------------------

    Gender:
      type: string
      enum: [MALE, FEMALE, OTHER]

    TestOrderStatus:
      type: string
      enum: [PENDING, IN_PROGRESS, COMPLETED, CANCELLED, DELIVERED]

    ReportStatus:
      type: string
      enum: [DRAFT, PENDING_REVIEW, VALIDATED, DELIVERED]

    InvoiceStatus:
      type: string
      enum: [PENDING, PAID, PARTIALLY_PAID, CANCELLED]

    PaymentMethod:
      type: string
      enum: [CASH, CARD, TRANSFER, CHECK, MOBILE_MONEY]

    MovementType:
      type: string
      enum: [IN, OUT, ADJUSTMENT]

    TicketStatus:
      type: string
      enum: [OPEN, IN_PROGRESS, RESOLVED, CLOSED]

    TicketPriority:
      type: string
      enum: [LOW, MEDIUM, HIGH, CRITICAL]

    TimeoffStatus:
      type: string
      enum: [PENDING, APPROVED, REJECTED]

    # -- Base response wrappers -----------------------------------------------

    PageMeta:
      type: object
      properties:
        page:
          type: integer
          example: 0
        size:
          type: integer
          example: 20
        totalElements:
          type: integer
          format: int64
          example: 100
        totalPages:
          type: integer
          example: 5
        last:
          type: boolean

    EmptyApiResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: OK
        data:
          nullable: true
        timestamp:
          type: string
          format: date-time

    ErrorApiResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Ressource introuvable
        data:
          nullable: true
        timestamp:
          type: string
          format: date-time

    ValidationErrorApiResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Erreurs de validation
        data:
          type: object
          additionalProperties:
            type: string
          example:
            firstName: Le prénom est obligatoire
            email: L'email doit être valide
        timestamp:
          type: string
          format: date-time

    UpdateStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: VALIDATED

    SimpleNameRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: Hématologie

    AssignPermissionsRequest:
      type: object
      required: [permissionIds]
      properties:
        permissionIds:
          type: array
          items:
            type: string
            format: uuid

    # -- Auth -----------------------------------------------------------------

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: admin@labo.com
        password:
          type: string
          minLength: 8
          example: P@ssw0rd

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    UpdatePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 8

    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        isActive:
          type: boolean
        branchId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time

    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
          example: Bearer
        user:
          $ref: '#/components/schemas/UserResponse'

    LoginApiResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          $ref: '#/components/schemas/LoginResponse'
        timestamp:
          type: string
          format: date-time

    # -- Branch ---------------------------------------------------------------

    BranchRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: Agence centrale
        address:
          type: string
        phone:
          type: string

    BranchResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        address:
          type: string
        phone:
          type: string
        createdAt:
          type: string
          format: date-time

    BranchApiResponse:
      type: object
      properties:
        success: {type: boolean}
        message: {type: string}
        data:
          $ref: '#/components/schemas/BranchResponse'
        timestamp: {type: string, format: date-time}

    BranchPageApiResponse:
      type: object
      properties:
        success: {type: boolean}
        message: {type: string}
        data:
          allOf:
            - $ref: '#/components/schemas/PageMeta'
            - type: object
              properties:
                content:
                  type: array
                  items:
                    $ref: '#/components/schemas/BranchResponse'
        timestamp: {type: string, format: date-time}

    # -- User -----------------------------------------------------------------

    UserRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        phone:
          type: string
        isActive:
          type: boolean
          default: true

    UserApiResponse:
      type: object
      properties:
        success: {type: boolean}
        message: {type: string}
        data:
          $ref: '#/components/schemas/UserResponse'
        timestamp: {type: string, format: date-time}

    UserPageApiResponse:
      type: object
      properties:
        success: {type: boolean}
        message: {type: string}
        data:
          allOf:
            - $ref: '#/components/schemas/PageMeta'
            - type: object
              properties:
                content:
                  type: array
                  items:
                    $ref: '#/components/schemas/UserResponse'
        timestamp: {type: string, format: date-time}

    # -- Role / Permission ----------------------------------------------------

    PermissionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string

    RoleRequest:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
        slug:
          type: string
        permissionIds:
          type: array
          items:
            type: string
            format: uuid

    RoleResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/PermissionResponse'
        createdAt:
          type: string
          format: date-time

    RoleApiResponse:
      type: object
      properties:
        success: {type: boolean}
        message: {type: string}
        data:
          $ref: '#/components/schemas/RoleResponse'
        timestamp: {type: string, format: date-time}

    RolePageApiResponse:
      type: object
      properties:
        success: {type: boolean}
        message: {type: string}
        data:
          allOf:
            - $ref: '#/components/schemas/PageMeta'
            - type: object
              properties:
                content:
                  type: array
                  items:
                    $ref: '#/components/schemas/RoleResponse'
        timestamp: {type: string, format: date-time}

    # -- Patient --------------------------------------------------------------

    PatientRequest:
      type: object
      required: [firstName, lastName, gender]
      properties:
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
          pattern: '^[+]?[0-9]{6,20}$'
        email:
          type: string
          format: email
        birthDate:
          type: string
          format: date
        gender:
          $ref: '#/components/schemas/Gender'
        address:
          type: string

    PatientResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        email:
          type: string
        birthDate:
          type: string
          format: date
        gender:
          $ref: '#/components/schemas/Gender'
        address:
          type: string
        branchId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time

    PatientApiResponse:
      type: object
      properties:
        success: {type: boolean}
        message: {type: string}
        data:
          $ref: '#/components/schemas/PatientResponse'
        timestamp: {type: string, format: date-time}

