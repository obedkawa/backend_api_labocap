openapi: 3.0.3
info:
  title: LIS Labo-Anapath API
  description: API REST de gestion de laboratoire d'anatomopathologie
  version: 1.0.0
servers:
  - url: http://localhost:8080/api/v1
    description: Développement local
  - url: https://api.labo-anapath.com/api/v1
    description: Production

tags:
  - name: Auth
  - name: Branches
  - name: Users
  - name: Roles
  - name: Patients
  - name: Doctors
  - name: Hospitals
  - name: Category Tests
  - name: Unit Measurements
  - name: Type Orders
  - name: Lab Tests
  - name: Test Orders
  - name: Reports
  - name: Title Reports
  - name: Pathology Macros
  - name: Tags
  - name: Consultations
  - name: Type Consultations
  - name: Contracts
  - name: Invoices
  - name: Payments
  - name: Cashboxes
  - name: Refund Requests
  - name: Employees
  - name: Articles
  - name: Suppliers
  - name: Movements
  - name: Settings
  - name: Report Templates
  - name: Tickets

security:
  - bearerAuth: []

paths:

  # ── AUTH ────────────────────────────────────────────────────────────────────

  /auth/login:
    post:
      tags: [Auth]
      summary: Connexion
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Connexion réussie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginApiResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Rafraîchir le token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Nouveau token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Déconnexion
      responses:
        '200':
          $ref: '#/components/responses/EmptySuccess'

  # ── BRANCHES ────────────────────────────────────────────────────────────────

  /branches:
    get:
      tags: [Branches]
      summary: Liste des agences
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - $ref: '#/components/parameters/search'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BranchPageApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Branches]
      summary: Créer une agence
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BranchRequest'
      responses:
        '201':
          description: Créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BranchApiResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /branches/{id}:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [Branches]
      summary: Détail d'une agence
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BranchApiResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Branches]
      summary: Modifier une agence
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BranchRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BranchApiResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Branches]
      summary: Supprimer une agence
      responses:
        '200':
          $ref: '#/components/responses/EmptySuccess'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── USERS ───────────────────────────────────────────────────────────────────

  /users:
    get:
      tags: [Users]
      summary: Liste des utilisateurs
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - $ref: '#/components/parameters/search'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPageApiResponse'
    post:
      tags: [Users]
      summary: Créer un utilisateur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
      responses:
        '201':
          description: Créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserApiResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/Conflict'

  /users/{id}:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [Users]
      summary: Détail d'un utilisateur
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserApiResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Users]
      summary: Modifier un utilisateur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserApiResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Users]
      summary: Supprimer un utilisateur
      responses:
        '200':
          $ref: '#/components/responses/EmptySuccess'

  /users/{id}/password:
    parameters:
      - $ref: '#/components/parameters/id'
    patch:
      tags: [Users]
      summary: Changer le mot de passe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePasswordRequest'
      responses:
        '200':
          $ref: '#/components/responses/EmptySuccess'
        '400':
          $ref: '#/components/responses/ValidationError'

  # ── ROLES ───────────────────────────────────────────────────────────────────

  /roles:
    get:
      tags: [Roles]
      summary: Liste des rôles
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RolePageApiResponse'
    post:
      tags: [Roles]
      summary: Créer un rôle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleRequest'
      responses:
        '201':
          description: Créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleApiResponse'
        '409':
          $ref: '#/components/responses/Conflict'

  /roles/{id}:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [Roles]
      summary: Détail d'un rôle
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleApiResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Roles]
      summary: Modifier un rôle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleApiResponse'
    delete:
      tags: [Roles]
      summary: Supprimer un rôle
      responses:
        '200':
          $ref: '#/components/responses/EmptySuccess'

  /roles/{id}/permissions:
    parameters:
      - $ref: '#/components/parameters/id'
    post:
      tags: [Roles]
      summary: Assigner des permissions à un rôle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignPermissionsRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleApiResponse'

  # ── PATIENTS ─────────────────────────────────────────────────────────────────

  /patients:
    get:
      tags: [Patients]
      summary: Liste des patients
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - $ref: '#/components/parameters/search'
        - $ref: '#/components/parameters/sortBy'
        - $ref: '#/components/parameters/sortDir'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientPageApiResponse'
    post:
      tags: [Patients]
      summary: Créer un patient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatientRequest'
      responses:
        '201':
          description: Créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientApiResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/Conflict'

  /patients/{id}:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [Patients]
      summary: Détail d'un patient
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientApiResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Patients]
      summary: Modifier un patient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatientRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientApiResponse'
    delete:
      tags: [Patients]
      summary: Supprimer un patient (soft delete)
      responses:
        '200':
          $ref: '#/components/responses/EmptySuccess'

  # ── DOCTORS ──────────────────────────────────────────────────────────────────

  /doctors:
    get:
      tags: [Doctors]
      summary: Liste des médecins
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - $ref: '#/components/parameters/search'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoctorPageApiResponse'
    post:
      tags: [Doctors]
      summary: Créer un médecin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DoctorRequest'
      responses:
        '201':
          description: Créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoctorApiResponse'

  /doctors/{id}:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [Doctors]
      summary: Détail d'un médecin
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoctorApiResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Doctors]
      summary: Modifier un médecin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DoctorRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoctorApiResponse'
    delete:
      tags: [Doctors]
      summary: Supprimer un médecin
      responses:
        '200':
          $ref: '#/components/responses/EmptySuccess'

  # ── HOSPITALS ────────────────────────────────────────────────────────────────

  /hospitals:
    get:
      tags: [Hospitals]
      summary: Liste des hôpitaux
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - $ref: '#/components/parameters/search'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HospitalPageApiResponse'
    post:
      tags: [Hospitals]
      summary: Créer un hôpital
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HospitalRequest'
      responses:
        '201':
          description: Créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HospitalApiResponse'

  /hospitals/{id}:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [Hospitals]
      summary: Détail d'un hôpital
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HospitalApiResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Hospitals]
      summary: Modifier un hôpital
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HospitalRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HospitalApiResponse'
    delete:
      tags: [Hospitals]
      summary: Supprimer un hôpital
      responses:
        '200':
          $ref: '#/components/responses/EmptySuccess'

  # ── CATEGORY TESTS ───────────────────────────────────────────────────────────

  /category-tests:
    get:
      tags: [Category Tests]
      summary: Liste des catégories d'analyses
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryTestPageApiResponse'
    post:
      tags: [Category Tests]
      summary: Créer une catégorie
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SimpleNameRequest'
      responses:
        '201':
          description: Créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryTestApiResponse'

  /category-tests/{id}:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [Category Tests]
      summary: Détail
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryTestApiResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Category Tests]
      summary: Modifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SimpleNameRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryTestApiResponse'
    delete:
      tags: [Category Tests]
      summary: Supprimer
      responses:
        '200':
          $ref: '#/components/responses/EmptySuccess'

  # ── UNIT MEASUREMENTS ────────────────────────────────────────────────────────

  /unit-measurements:
    get:
      tags: [Unit Measurements]
      summary: Liste des unités de mesure
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnitMeasurementPageApiResponse'
    post:
      tags: [Unit Measurements]
      summary: Créer une unité
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnitMeasurementRequest'
      responses:
        '201':
          description: Créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnitMeasurementApiResponse'

  /unit-measurements/{id}:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [Unit Measurements]
      summary: Détail
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnitMeasurementApiResponse'
    put:
      tags: [Unit Measurements]
      summary: Modifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnitMeasurementRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnitMeasurementApiResponse'
    delete:
      tags: [Unit Measurements]
      summary: Supprimer
      responses:
        '200':
          $ref: '#/components/responses/EmptySuccess'

  # ── TYPE ORDERS ──────────────────────────────────────────────────────────────

  /type-orders:
    get:
      tags: [Type Orders]
      summary: Liste des types de bons
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TypeOrderPageApiResponse'
    post:
      tags: [Type Orders]
      summary: Créer un type de bon
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SimpleNameRequest'
      responses:
        '201':
          description: Créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TypeOrderApiResponse'

  /type-orders/{id}:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [Type Orders]
      summary: Détail
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TypeOrderApiResponse'
    put:
      tags: [Type Orders]
      summary: Modifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SimpleNameRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TypeOrderApiResponse'
    delete:
      tags: [Type Orders]
      summary: Supprimer
      responses:
        '200':
          $ref: '#/components/responses/EmptySuccess'

  # ── LAB TESTS ────────────────────────────────────────────────────────────────

  /lab-tests:
    get:
      tags: [Lab Tests]
      summary: Catalogue des analyses
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - $ref: '#/components/parameters/search'
        - name: categoryTestId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LabTestPageApiResponse'
    post:
      tags: [Lab Tests]
      summary: Créer une analyse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LabTestRequest'
      responses:
        '201':
          description: Créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LabTestApiResponse'

  /lab-tests/{id}:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [Lab Tests]
      summary: Détail d'une analyse
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LabTestApiResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Lab Tests]
      summary: Modifier une analyse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LabTestRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LabTestApiResponse'
    delete:
      tags: [Lab Tests]
      summary: Supprimer une analyse
      responses:
        '200':
          $ref: '#/components/responses/EmptySuccess'

  # ── TEST ORDERS ──────────────────────────────────────────────────────────────

  /test-orders:
    get:
      tags: [Test Orders]
      summary: Liste des bons d'examen
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - $ref: '#/components/parameters/search'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/TestOrderStatus'
        - name: doctorId
          in: query
          schema:
            type: string
            format: uuid
        - name: hospitalId
          in: query
          schema:
            type: string
            format: uuid
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestOrderPageApiResponse'
    post:
      tags: [Test Orders]
      summary: Créer un bon d'examen
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestOrderRequest'
      responses:
        '201':
          description: Créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestOrderApiResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /test-orders/{id}:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [Test Orders]
      summary: Détail d'un bon d'examen
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestOrderApiResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Test Orders]
      summary: Modifier un bon d'examen
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestOrderRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestOrderApiResponse'
    delete:
      tags: [Test Orders]
      summary: Annuler un bon d'examen
      responses:
        '200':
          $ref: '#/components/responses/EmptySuccess'

  /test-orders/{id}/status:
    parameters:
      - $ref: '#/components/parameters/id'
    patch:
      tags: [Test Orders]
      summary: Changer le statut
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStatusRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestOrderApiResponse'
        '422':
          $ref: '#/components/responses/BusinessError'

  /test-orders/{id}/deliver:
    parameters:
      - $ref: '#/components/parameters/id'
    post:
      tags: [Test Orders]
      summary: Marquer comme livré
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                receiverName:
                  type: string
      responses:
        '200':
