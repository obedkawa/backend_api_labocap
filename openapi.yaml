                content:
                  type: array
                  items:
                    $ref: '#/components/schemas/PatientResponse'
        timestamp: {type: string, format: date-time}

    # -- Doctor / Hospital ----------------------------------------------------

    HospitalRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        phone:
          type: string
        address:
          type: string
